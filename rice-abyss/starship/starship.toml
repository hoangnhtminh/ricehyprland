##############################################
# STARSHIP — Abyss Theme
##############################################

format = """
[╭─](fg:#2a3a5c)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$package\
$nodejs\
$python\
$rust\
$golang\
$java\
$docker_context\
$fill\
$cmd_duration\
$memory_usage\
$time\
$line_break\
[╰─](fg:#2a3a5c)\
$character"""

add_newline = true

# ── OS ────────────────────────────────────
[os]
disabled = false
style = "bg:#0e1421 fg:#4d9fff"
format = "[$symbol]($style)[ ](fg:#2a3a5c bg:#0e1421)"

[os.symbols]
Arch     = " "
Ubuntu   = " "
Debian   = " "
Fedora   = " "
NixOS    = " "
Windows  = "󰍲 "
Macos    = "󰀵 "
Linux    = " "
Unknown  = " "

# ── USERNAME ──────────────────────────────
[username]
show_always = false
style_user   = "bg:#0e1421 fg:#a57fff bold"
style_root   = "bg:#0e1421 fg:#ff4d6a bold"
format       = "[ $user]($style)"
disabled     = false

[hostname]
style    = "bg:#0e1421 fg:#4dffb4"
format   = "[@$hostname ]($style)"
disabled = false

# ── DIRECTORY ─────────────────────────────
[directory]
style             = "bg:#1d2740 fg:#c8d8f8 bold"
read_only         = "  "
read_only_style   = "bg:#1d2740 fg:#ff4d6a"
truncation_length = 3
truncate_to_repo  = true
format            = "[ 󰉋 $path]($style)[$read_only]($read_only_style)[ ](fg:#2a3a5c bg:#1d2740)"

# ── GIT ───────────────────────────────────
[git_branch]
style    = "bg:#2a3a5c fg:#4d9fff bold"
symbol   = " "
format   = "[ $symbol$branch(:$remote_branch)]($style)"

[git_status]
style     = "bg:#2a3a5c fg:#ffd700"
format    = "([$all_status$ahead_behind]($style))[ ](fg:#2a3a5c bg:#2a3a5c)"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed   = "󰏗 ${count}"
modified  = "!${count}"
staged    = "+${count}"
renamed   = "»${count}"
deleted   = "✘${count}"

[git_metrics]
disabled           = false
added_style        = "fg:#4dffb4"
deleted_style      = "fg:#ff4d6a"
format             = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# ── FILL ──────────────────────────────────
[fill]
symbol = " "
style  = "fg:#1d2740"

# ── CMD DURATION ──────────────────────────
[cmd_duration]
min_time          = 2000
style             = "fg:#ffd700"
format            = "[ 󱛡 $duration ]($style)"
show_milliseconds = true

# ── MEMORY ────────────────────────────────
[memory_usage]
disabled  = false
threshold = 70
style     = "fg:#ff4d6a"
format    = "[ 󰾆 $ram_pct ]($style)"
symbol    = "󰾆"

# ── TIME ──────────────────────────────────
[time]
disabled    = false
style       = "fg:#7a8aaa"
format      = "[  $time ]($style)"
time_format = "%H:%M"
use_12hr    = false

# ── CHARACTER ─────────────────────────────
[character]
success_symbol = "[❯](fg:#4d9fff bold)"
error_symbol   = "[❯](fg:#ff4d6a bold)"
vimcmd_symbol  = "[❮](fg:#a57fff bold)"

# ── LANGUAGES ─────────────────────────────
[nodejs]
style   = "fg:#4dffb4"
symbol  = "󰎙 "
format  = "[$symbol$version ]($style)"

[python]
style          = "fg:#ffd700"
symbol         = " "
format         = "[$symbol$version ]($style)"
python_binary  = ["python3", "python"]

[rust]
style  = "fg:#ff9a3c"
symbol = " "
format = "[$symbol$version ]($style)"

[golang]
style  = "fg:#00d4ff"
symbol = " "
format = "[$symbol$version ]($style)"

[docker_context]
style  = "fg:#4d9fff"
symbol = "󰡨 "
format = "[$symbol$context ]($style)"

[package]
style  = "fg:#a57fff"
symbol = "󰏗 "
format = "[$symbol$version ]($style)"

[java]
style  = "fg:#ff9a3c"
symbol = " "
format = "[$symbol$version ]($style)"
