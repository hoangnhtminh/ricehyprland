##############################################
# Hyprland Config — Abyss Theme             #
##############################################

# ── MONITORS ──────────────────────────────
monitor=,preferred,auto,1

# ── AUTOSTART ─────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swayidle -w timeout 300 'hyprlock' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'
exec-once = hypridle

# ── ENV VARS ──────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── GENERAL ───────────────────────────────
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(4d9fffee) rgba(a57fffee) 45deg
    col.inactive_border = rgba(1d2740aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# ── DECORATION ────────────────────────────
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    drop_shadow = true
    shadow_range = 20
    shadow_render_power = 3
    shadow_color = rgba(000000bb)
    shadow_offset = 0 4

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.18
        vibrancy_darkness = 0.5
        noise = 0.01
        contrast = 0.9
        brightness = 0.82
        popups = true
        new_optimizations = true
        xray = false
    }
}

# ── ANIMATIONS ────────────────────────────
animations {
    enabled = true
    first_launch_animation = true

    bezier = easeOut,   0.16, 1,    0.3, 1
    bezier = easeIn,    0.4,  0,    1,   1
    bezier = easeInOut, 0.37, 0,    0.63, 1
    bezier = spring,    0.5,  1.25, 0.75, 1.0
    bezier = linear,    0.0,  0.0,  1.0,  1.0
    bezier = bounce,    0.34, 1.56, 0.64, 1

    animation = windows,     1, 4,  spring,    popin 80%
    animation = windowsOut,  1, 3,  easeIn,    popin 80%
    animation = windowsMove, 1, 3,  spring
    animation = border,      1, 10, linear
    animation = borderangle, 1, 40, linear,    loop
    animation = fade,        1, 4,  easeInOut
    animation = fadeIn,      1, 3,  easeOut
    animation = fadeOut,     1, 3,  easeIn
    animation = workspaces,  1, 4,  easeOut,   slide
    animation = layers,      1, 3,  spring,    popin 80%
    animation = layersOut,   1, 3,  easeIn,    fade
}

# ── INPUT ─────────────────────────────────
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = -0.3
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
        tap-and-drag = true
        scroll_factor = 0.8
    }
}

# ── GESTURES ──────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
}

# ── LAYOUTS ───────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_is_master = false
    new_on_top = false
    mfact = 0.5
}

# ── MISC ──────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 0
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty|Alacritty)$
    focus_on_activate = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ── PERFORMANCE ───────────────────────────
render {
    explicit_sync = 2
    explicit_sync_kms = 2
    direct_scanout = false
}

# ══════════════════════════════════════════
# KEYBINDINGS
# ══════════════════════════════════════════
$mod = SUPER
$terminal = kitty
$filemanager = thunar
$launcher = rofi -show drun
$browser = firefox

# ── Applications ──────────────────────────
bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $filemanager
bind = $mod, R, exec, $launcher
bind = $mod, B, exec, $browser
bind = $mod, period, exec, rofi -show emoji
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ── Window Management ─────────────────────
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exec, wlogout
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, Space, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, M, exec, hyprctl dispatch layoutmsg swapwithmaster
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ── Resize Mode ───────────────────────────
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 20 0
binde = , left,  resizeactive, -20 0
binde = , up,    resizeactive, 0 -20
binde = , down,  resizeactive, 0 20
binde = , L, resizeactive, 20 0
binde = , H, resizeactive, -20 0
binde = , K, resizeactive, 0 -20
binde = , J, resizeactive, 0 20
bind  = , escape, submap, reset
submap = reset

# ── Workspaces ────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bind = $mod, grave, workspace, previous

# ── Scratchpad ────────────────────────────
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# ── Screenshot ────────────────────────────
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mod, Print, exec, grim - | swappy -f -
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# ── Media Keys ────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Mouse ─────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Lock / Exit ───────────────────────────
bind = $mod, Escape, exec, hyprlock
bind = $mod CTRL, Escape, exit

# ══════════════════════════════════════════
# WINDOW RULES
# ══════════════════════════════════════════

# Floats
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save File)(.*)$
windowrulev2 = float, title:^(Confirm)(.*)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation)(.*)$

# Sizes for floats
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 800 500, class:^(thunar)$, floating:1

# Centers
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(org.gnome.Calculator)$

# Opacity rules
windowrulev2 = opacity 0.90 0.85, class:^(thunar)$
windowrulev2 = opacity 0.95 0.90, class:^(kitty)$
windowrulev2 = opacity 0.92 0.85, class:^(discord)$
windowrulev2 = opacity 0.95 0.90, class:^(Code)$

# Workspaces
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 3, class:^(discord)$
windowrulev2 = workspace 4, class:^(spotify)$

# No animations for certain windows
windowrulev2 = noanim, class:^(wofi)$
windowrulev2 = noanim, class:^(rofi)$

# Tear (games)
windowrulev2 = immediate, class:^(cs2)$
windowrulev2 = immediate, class:^(steam_app_)(.*)$

# Idle inhibit
windowrulev2 = idleinhibit fullscreen, class:^(.*)$
