##############################################
# HYPRLOCK — Abyss Theme
##############################################

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 5
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# ── BACKGROUND ────────────────────────────
background {
    monitor =
    path = ~/.config/hypr/wallpapers/wallpaper.jpg
    blur_passes = 4
    blur_size = 8
    brightness = 0.5
    vibrancy = 0.15
    vibrancy_darkness = 0.0
    contrast = 0.95
    noise = 0.01
}

# ── TIME ──────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(c8d8f8ff)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_color = rgba(00000099)
    shadow_size = 5
}

# ── DATE ──────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d %Y")"
    color = rgba(a0b4d8cc)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 75
    halign = center
    valign = center
}

# ── USER AVATAR ───────────────────────────
shape {
    monitor =
    size = 110, 110
    color = rgba(4d9fff22)
    rounding = -1
    border_size = 2
    border_color = rgba(4d9fffcc)
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = 
    color = rgba(4d9fffee)
    font_size = 60
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

# ── PASSWORD INPUT ────────────────────────
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(4d9fff88)
    inner_color = rgba(070b1499)
    font_color = rgba(c8d8f8ff)
    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text = <span foreground="##7a8aaa">  Enter Password</span>
    hide_input = false
    rounding = 10
    check_color = rgba(4dffb4ff)
    fail_color = rgba(ff4d6aff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgba(ffd700ff)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -220
    halign = center
    valign = center
}

# ── STATUS HINT ───────────────────────────
label {
    monitor =
    text = cmd[update:30000] echo "  $(hostname) |   $(whoami)"
    color = rgba(7a8aaacc)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -295
    halign = center
    valign = center
}
