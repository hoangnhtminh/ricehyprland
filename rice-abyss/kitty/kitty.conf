##############################################
# KITTY — Abyss Theme
##############################################

# ── FONTS ─────────────────────────────────
font_family               JetBrainsMono Nerd Font
bold_font                 JetBrainsMono Nerd Font Bold
italic_font               JetBrainsMono Nerd Font Italic
bold_italic_font          JetBrainsMono Nerd Font Bold Italic
font_size                 12.5
disable_ligatures         never
font_features             JetBrainsMonoNerdFont-Regular +calt +liga +cv01 +cv02

# ── CURSOR ────────────────────────────────
cursor_shape              block
cursor_blink_interval     0.6
cursor_stop_blinking_after 15
cursor_beam_thickness     1.5
cursor_underline_thickness 2

# ── SCROLLBACK ────────────────────────────
scrollback_lines          5000
scrollback_pager          less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── MOUSE ─────────────────────────────────
mouse_hide_wait           2.0
copy_on_select            clipboard
focus_follows_mouse       no

# ── PERFORMANCE ───────────────────────────
repaint_delay             8
input_delay               2
sync_to_monitor           yes

# ── BELL ──────────────────────────────────
enable_audio_bell         no
visual_bell_duration      0.1
visual_bell_color         none
window_alert_on_bell      yes
bell_on_tab               "🔔 "

# ── WINDOW ────────────────────────────────
remember_window_size      yes
initial_window_width      1000
initial_window_height     650
window_padding_width      14 16
window_border_width       0
window_margin_width       0
single_window_margin_width -1
placement_strategy        center
hide_window_decorations   yes
confirm_os_window_close   0

# ── TRANSPARENCY ──────────────────────────
background_opacity        0.88
background_blur           32
dynamic_background_opacity yes

# ── TABS ──────────────────────────────────
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_margin_width      0
tab_bar_margin_height     0 0
tab_bar_background        none
tab_title_template        " {fmt.fg.tab}{title}{fmt.fg.default} "
active_tab_title_template " 󰆤 {title} "
active_tab_font_style     bold
inactive_tab_font_style   normal

# ── COLORS ────────────────────────────────
# Abyss Palette
foreground                #c8d8f8
background                #070b14
selection_foreground      #070b14
selection_background      #4d9fff

# Cursor
cursor                    #4d9fff
cursor_text_color         #070b14

# URL
url_color                 #00d4ff
url_style                 curly

# Tabs
active_tab_foreground     #4d9fff
active_tab_background     #1d2740
inactive_tab_foreground   #7a8aaa
inactive_tab_background   #0e1421
tab_bar_background        #070b14

# Marks
mark1_foreground          #070b14
mark1_background          #4d9fff
mark2_foreground          #070b14
mark2_background          #a57fff
mark3_foreground          #070b14
mark3_background          #4dffb4

# Black
color0                    #1d2740
color8                    #2a3a5c

# Red
color1                    #ff4d6a
color9                    #ff7a8a

# Green
color2                    #4dffb4
color10                   #80ffcc

# Yellow
color3                    #ffd700
color11                   #ffe44d

# Blue
color4                    #4d9fff
color12                   #80bdff

# Magenta/Purple
color5                    #a57fff
color13                   #c4a7ff

# Cyan
color6                    #00d4ff
color14                   #4de6ff

# White
color7                    #c8d8f8
color15                   #e8f0ff

# ── KEYBOARD SHORTCUTS ────────────────────
kitty_mod                 ctrl+shift

map kitty_mod+t           new_tab_with_cwd
map kitty_mod+w           close_tab
map kitty_mod+right       next_tab
map kitty_mod+left        previous_tab
map kitty_mod+n           new_window_with_cwd
map kitty_mod+enter       new_window_with_cwd
map kitty_mod+f           show_scrollback
map kitty_mod+equal       change_font_size all +1.0
map kitty_mod+minus       change_font_size all -1.0
map kitty_mod+backspace   change_font_size all 0
map kitty_mod+l           clear_terminal scroll active
map kitty_mod+s           toggle_maximized
map kitty_mod+b           toggle_layout tall

# ── MISC ──────────────────────────────────
shell_integration         enabled
allow_hyperlinks          yes
term                      xterm-kitty
update_check_interval     0
startup_session           none
clipboard_control         write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size        512
close_on_child_death      no
